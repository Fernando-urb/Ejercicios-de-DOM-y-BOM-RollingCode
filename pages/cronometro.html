<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronometro</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="bg-gray-900  ">
  <main>
    <div class="flex flex-col items-center justify-center h-screen">
      <h1 class="text-4xl font-bold text-white mb-4">Cronometro</h1>
      <span id="cronometro" class="text-7xl font-bold text-white mr-2">00:00:00</span>
      <div class="flex  items-center py-5 gap-5">
        <button id="boton-inio-pausa"
          class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded cursor-pointer iniciar">Iniciar / Pausar</button>
        <button id="boton-reiniciar"
          class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded  cursor-pointer pausar">Reiniciar</button>
      </div>
    </div>

  </main>





  <script src="../js/cronometro.js"></script>
</body>

</html>
